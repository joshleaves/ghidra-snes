name: CI

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install Ghidra
        uses: antoniovazquezblanco/setup-ghidra@v2
        with:
          version: 12.0.4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Spotless check
        run: ./gradlew -PGHIDRA_INSTALL_DIR=${{ env.GHIDRA_INSTALL_DIR }} spotlessCheck

      - name: Run unit tests
        run: ./gradlew -PGHIDRA_INSTALL_DIR=${{ env.GHIDRA_INSTALL_DIR }} test
