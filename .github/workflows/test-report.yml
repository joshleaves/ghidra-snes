name: 'Test Report'
on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Publish test report
        uses: dorny/test-reporter@v3
        with:
          artifact: test-results
          name: JUnit tests
          path: '*.xml'
          reporter: java-junit
